title: archana kalburgi
tagline: ml engineer · notes from the terminal
author: Archana Kalburgi
email: archanakalburgi@gmail.com
description: >-
  Writing about machine learning, systems, and the messy middle
  where ideas meet data.

url: "https://archanakalburgi.github.io"
baseurl: "/tuktuk"

permalink: /:year/:month/:day/:title.html

show_excerpts: true
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  toc_levels: 2..3
  auto_ids: true

sass:
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      toc: true

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - .jekyll-cache
